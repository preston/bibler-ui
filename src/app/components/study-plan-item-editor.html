@if (vm.selectedPlanItem(); as item) {
  @if (vm.canEditStructure()) {
    <div class="card mb-3 bg-success">
      <div class="card-header"><strong>Plan item</strong></div>
      <div class="card-body">
        <div class="row g-2">
          <div class="col-md-6">
            <label class="form-label small mb-0" [attr.for]="'plan_item_title_' + item.uuid">Title</label>
            <input
              class="form-control form-control-sm"
              [id]="'plan_item_title_' + item.uuid"
              [ngModel]="vm.planItemDrafts()[item.uuid]?.title ?? item.title"
              (ngModelChange)="vm.setPlanItemDraft(item.uuid, 'title', $event)"
              placeholder="Title"
            />
            <label class="form-label small mb-0 mt-2" [attr.for]="'plan_item_duration_' + item.uuid">Duration (minutes)</label>
            <input
              type="number"
              min="0"
              step="1"
              class="form-control form-control-sm"
              [id]="'plan_item_duration_' + item.uuid"
              [ngModel]="vm.planItemDrafts()[item.uuid]?.duration ?? ''"
              (ngModelChange)="vm.setPlanItemDurationDraft(item.uuid, $event)"
              placeholder="Optional"
            />
            <div class="form-text">Use 0 or blank for unspecified.</div>
          </div>
          <div class="col-md-6">
            <label class="form-label small mb-0" [attr.for]="'plan_item_notes_' + item.uuid">Notes</label>
            <textarea
              class="form-control form-control-sm"
              rows="4"
              [id]="'plan_item_notes_' + item.uuid"
              [ngModel]="vm.planItemDrafts()[item.uuid]?.notes ?? (item.notes ?? '')"
              (ngModelChange)="vm.setPlanItemDraft(item.uuid, 'notes', $event)"
              placeholder="Notes"
            ></textarea>
            <div class="mt-2 d-flex justify-content-end">
              <div class="btn-group btn-group-sm">
                <button
                  class="btn btn-outline-primary"
                  type="button"
                  (click)="vm.savePlanItem(item)"
                  title="Save"
                  aria-label="Save plan item"
                >
                  <span class="bi bi-floppy" aria-hidden="true"></span>
                </button>
                @if (vm.canDeleteContent()) {
                  <button
                    class="btn btn-outline-danger"
                    type="button"
                    (click)="vm.deletePlanItem(item)"
                    title="Delete"
                    aria-label="Delete plan item"
                  >
                    <span class="bi bi-trash" aria-hidden="true"></span>
                  </button>
                }
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  } @else {
    <div class="small text-muted">{{ item.notes }}</div>
  }
}
