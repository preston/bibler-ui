<div class="container py-3">
  <div class="row g-3">
    <div class="col-md-3 col-lg-2">
      <div class="card">
        <div class="card-header"><strong>Settings</strong></div>
        <div class="list-group list-group-flush">
          <a class="list-group-item list-group-item-action" routerLink="/settings/access" routerLinkActive="active">Access</a>
          @if (session.hasBiblesPermission()) {
            <a class="list-group-item list-group-item-action" routerLink="/settings/ai" routerLinkActive="active">AI Defaults</a>
          }
          @if (session.hasCurationPermission()) {
            <a class="list-group-item list-group-item-action" routerLink="/settings/studies" routerLinkActive="active">Studies</a>
          }
          @if (session.hasAccessPermission()) {
            <a class="list-group-item list-group-item-action" routerLink="/settings/roles" routerLinkActive="active">Roles</a>
            <a class="list-group-item list-group-item-action" routerLink="/settings/users" routerLinkActive="active">Users</a>
          }
        </div>
      </div>
    </div>
    <div class="col-md-9 col-lg-10">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
